<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter | My Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-box">
    <h1>🌡️ Temperature Converter</h1>
    <div class="subtitle">Convert between Celsius, Fahrenheit & Kelvin</div>

    <!-- Error message area -->
    <div id="errorMsg" class="error-msg">
        ⚠️ Please enter a valid number!
    </div>

    <!-- Temperature input -->
    <div class="input-group">
        <label>Enter Temperature:</label>
        <input type="text" id="tempValue" class="temp-input" placeholder="Example: 100">
    </div>

    <!-- Choose input unit -->
    <div class="input-group">
        <label>Select Input Unit:</label>
        <div class="radio-group">
            <label>
                <input type="radio" name="unit" value="celsius" checked> Celsius (°C)
            </label>
            <label>
                <input type="radio" name="unit" value="fahrenheit"> Fahrenheit (°F)
            </label>
            <label>
                <input type="radio" name="unit" value="kelvin"> Kelvin (K)
            </label>
        </div>
    </div>

    <!-- Convert button -->
    <button id="convertBtn" class="convert-btn">Convert Temperature</button>

    <!-- Result display -->
    <div class="result-box">
        <div class="result-label">Converted Result</div>
        <div id="resultDisplay" class="result-value">—</div>
        <div id="resultDesc" class="result-unit">Waiting for input</div>
    </div>

    <footer>
        Made by Sanskruti | Supports C, F, K
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
